services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-textbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textbook}
      POSTGRES_DB: ${POSTGRES_DB:-textbook_agent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-textbook} -d ${POSTGRES_DB:-textbook_agent}"
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  db-dev:
    image: postgres:16-alpine
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-textbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textbook}
      POSTGRES_DB: ${POSTGRES_DB:-textbook_agent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-textbook} -d ${POSTGRES_DB:-textbook_agent}"
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # The FastAPI app runs Alembic migrations on startup before serving traffic.
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-textbook}:${POSTGRES_PASSWORD:-textbook}@db:5432/${POSTGRES_DB:-textbook_agent}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LECTIO_CONTRACTS_DIR: /app/backend/contracts
    volumes:
      - backend_outputs:/app/backend/outputs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      additional_contexts:
        lectio: ../lectio
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
  pgdata_dev:
  backend_outputs:
