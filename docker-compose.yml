services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-textbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textbook}
      POSTGRES_DB: ${POSTGRES_DB:-textbook_agent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-textbook} -d ${POSTGRES_DB:-textbook_agent}"
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  db-dev:
    image: postgres:16-alpine
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-textbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-textbook}
      POSTGRES_DB: ${POSTGRES_DB:-textbook_agent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-textbook} -d ${POSTGRES_DB:-textbook_agent}"
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # The FastAPI app runs Alembic migrations on startup before serving traffic.
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-textbook}:${POSTGRES_PASSWORD:-textbook}@db:5432/${POSTGRES_DB:-textbook_agent}
      DB_ECHO: ${DB_ECHO:-false}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LESSON_BUILDER_PUBLIC_URL: ${LESSON_BUILDER_PUBLIC_URL:-http://localhost:3000}
      PDF_EXPORT_ENABLED: ${PDF_EXPORT_ENABLED:-true}
      PDF_RENDER_BASE_URL: ${PDF_RENDER_BASE_URL:-http://frontend}
      PDF_EXPORT_TIMEOUT_MS: ${PDF_EXPORT_TIMEOUT_MS:-45000}
      PLAYWRIGHT_TIMEOUT_MS: ${PLAYWRIGHT_TIMEOUT_MS:-45000}
      PDF_TEMP_DIR: ${PDF_TEMP_DIR:-outputs/pdf}
      PDF_MAX_FILE_SIZE_MB: ${PDF_MAX_FILE_SIZE_MB:-50}
      PDF_MAX_PAGE_COUNT: ${PDF_MAX_PAGE_COUNT:-200}
      LECTIO_CONTRACTS_DIR: /app/backend/contracts
      GENERATION_MAX_CONCURRENT_PER_USER: ${GENERATION_MAX_CONCURRENT_PER_USER:-2}
      PIPELINE_CONCURRENCY_DRAFT_SECTION_MAX: ${PIPELINE_CONCURRENCY_DRAFT_SECTION_MAX:-6}
      PIPELINE_CONCURRENCY_DRAFT_DIAGRAM_MAX: ${PIPELINE_CONCURRENCY_DRAFT_DIAGRAM_MAX:-2}
      PIPELINE_CONCURRENCY_DRAFT_QC_MAX: ${PIPELINE_CONCURRENCY_DRAFT_QC_MAX:-6}
      PIPELINE_CONCURRENCY_BALANCED_SECTION_MAX: ${PIPELINE_CONCURRENCY_BALANCED_SECTION_MAX:-4}
      PIPELINE_CONCURRENCY_BALANCED_DIAGRAM_MAX: ${PIPELINE_CONCURRENCY_BALANCED_DIAGRAM_MAX:-2}
      PIPELINE_CONCURRENCY_BALANCED_QC_MAX: ${PIPELINE_CONCURRENCY_BALANCED_QC_MAX:-4}
      PIPELINE_CONCURRENCY_STRICT_SECTION_MAX: ${PIPELINE_CONCURRENCY_STRICT_SECTION_MAX:-3}
      PIPELINE_CONCURRENCY_STRICT_DIAGRAM_MAX: ${PIPELINE_CONCURRENCY_STRICT_DIAGRAM_MAX:-1}
      PIPELINE_CONCURRENCY_STRICT_QC_MAX: ${PIPELINE_CONCURRENCY_STRICT_QC_MAX:-3}
      PIPELINE_TIMEOUT_GENERATION_BASE_SECONDS: ${PIPELINE_TIMEOUT_GENERATION_BASE_SECONDS:-120}
      PIPELINE_TIMEOUT_GENERATION_PER_SECTION_SECONDS: ${PIPELINE_TIMEOUT_GENERATION_PER_SECTION_SECONDS:-90}
      PIPELINE_TIMEOUT_GENERATION_CAP_SECONDS: ${PIPELINE_TIMEOUT_GENERATION_CAP_SECONDS:-900}
      PIPELINE_TIMEOUT_CURRICULUM_SECONDS: ${PIPELINE_TIMEOUT_CURRICULUM_SECONDS:-60}
      PIPELINE_TIMEOUT_CONTENT_CORE_SECONDS: ${PIPELINE_TIMEOUT_CONTENT_CORE_SECONDS:-180}
      PIPELINE_TIMEOUT_CONTENT_PRACTICE_SECONDS: ${PIPELINE_TIMEOUT_CONTENT_PRACTICE_SECONDS:-120}
      PIPELINE_TIMEOUT_CONTENT_ENRICHMENT_SECONDS: ${PIPELINE_TIMEOUT_CONTENT_ENRICHMENT_SECONDS:-90}
      PIPELINE_TIMEOUT_CONTENT_REPAIR_SECONDS: ${PIPELINE_TIMEOUT_CONTENT_REPAIR_SECONDS:-120}
      PIPELINE_TIMEOUT_FIELD_REGEN_SECONDS: ${PIPELINE_TIMEOUT_FIELD_REGEN_SECONDS:-60}
      PIPELINE_TIMEOUT_QC_SECONDS: ${PIPELINE_TIMEOUT_QC_SECONDS:-60}
      PIPELINE_TIMEOUT_DIAGRAM_INNER_SECONDS: ${PIPELINE_TIMEOUT_DIAGRAM_INNER_SECONDS:-45}
      PIPELINE_TIMEOUT_DIAGRAM_NODE_BUDGET_SECONDS: ${PIPELINE_TIMEOUT_DIAGRAM_NODE_BUDGET_SECONDS:-60}
      PIPELINE_RERENDER_DRAFT_SECTION_MAX: ${PIPELINE_RERENDER_DRAFT_SECTION_MAX:-1}
      PIPELINE_RERENDER_BALANCED_SECTION_MAX: ${PIPELINE_RERENDER_BALANCED_SECTION_MAX:-2}
      PIPELINE_RERENDER_STRICT_SECTION_MAX: ${PIPELINE_RERENDER_STRICT_SECTION_MAX:-3}
      PIPELINE_RETRY_CURRICULUM_MAX_ATTEMPTS: ${PIPELINE_RETRY_CURRICULUM_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_CONTENT_CORE_MAX_ATTEMPTS: ${PIPELINE_RETRY_CONTENT_CORE_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_CONTENT_PRACTICE_MAX_ATTEMPTS: ${PIPELINE_RETRY_CONTENT_PRACTICE_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_CONTENT_ENRICHMENT_MAX_ATTEMPTS: ${PIPELINE_RETRY_CONTENT_ENRICHMENT_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_CONTENT_REPAIR_MAX_ATTEMPTS: ${PIPELINE_RETRY_CONTENT_REPAIR_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_FIELD_REGEN_MAX_ATTEMPTS: ${PIPELINE_RETRY_FIELD_REGEN_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_QC_MAX_ATTEMPTS: ${PIPELINE_RETRY_QC_MAX_ATTEMPTS:-2}
      PIPELINE_RETRY_MEDIA_MAX_ATTEMPTS: ${PIPELINE_RETRY_MEDIA_MAX_ATTEMPTS:-1}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      additional_contexts:
        lectio: ../lectio
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  pgdata:
  pgdata_dev:
