name: Architecture Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  architecture-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-extras
      - id: guard
        name: Check architecture boundaries
        continue-on-error: true
        working-directory: backend
        run: uv run python ../tools/agent/check_architecture.py --context docs/project/context-summary.yaml --format markdown > ../architecture-report.md
      - name: Write step summary
        if: always()
        run: cat architecture-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Generate SARIF artifact
        if: always()
        working-directory: backend
        run: uv run python ../tools/agent/check_architecture.py --context docs/project/context-summary.yaml --format sarif > ../architecture-report.sarif
      - name: Upload architecture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-guard
          path: |
            architecture-report.md
            architecture-report.sarif
      - name: Fail on architecture violations
        if: steps.guard.outcome != 'success'
        run: exit 1
