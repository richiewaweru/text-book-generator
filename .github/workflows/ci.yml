name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Run backend validation
        working-directory: backend
        run: uv run python ../tools/agent/validate_repo.py --context docs/project/context-summary.yaml --scope backend

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install uv
        run: python -m pip install uv
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend validation
        working-directory: backend
        run: uv run python ../tools/agent/validate_repo.py --context docs/project/context-summary.yaml --scope frontend
