name: Agent Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  agent-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Check scaffold drift
        working-directory: backend
        run: uv run python ../agents/scripts/bootstrap_project.py --context docs/project/context-summary.yaml --mode check
      - name: Run agent OS tests
        working-directory: backend
        run: uv run pytest ../agents/tests
      - name: Run project agent tool tests
        working-directory: backend
        run: uv run pytest ../tools/agent/tests
      - name: Validate PR contract and runbook
        if: github.event_name == 'pull_request'
        working-directory: backend
        run: uv run python ../agents/scripts/validate_agent_contract.py --context docs/project/context-summary.yaml
