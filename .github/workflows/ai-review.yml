name: AI Review

on:
  pull_request_target:
    types:
      - labeled
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  advisory-review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'ai-review') &&
        github.event.pull_request.state == 'open' &&
        !github.event.pull_request.draft
      )
    runs-on: ubuntu-latest
    env:
      AI_REVIEW_PROVIDER: ${{ vars.AI_REVIEW_PROVIDER }}
      AI_REVIEW_OPENAI_MODEL: ${{ vars.AI_REVIEW_OPENAI_MODEL }}
      AI_REVIEW_ANTHROPIC_MODEL: ${{ vars.AI_REVIEW_ANTHROPIC_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Run advisory review
        working-directory: backend
        run: uv run python ../automation/scripts/run_ai_review.py --output ../ai-review.md --publish-comment
      - name: Append AI review summary
        if: always()
        run: |
          if [ -f ai-review.md ]; then
            cat ai-review.md >> "$GITHUB_STEP_SUMMARY"
          fi
