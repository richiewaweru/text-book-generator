name: Feature
description: Capture a new feature or major change.
title: "feat: "
labels:
  - runbook
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What capability is being added?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Architecture impact
      description: What systems or interfaces will change?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this is done?
    validations:
      required: true
