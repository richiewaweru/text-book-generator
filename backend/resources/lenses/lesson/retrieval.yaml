id: retrieval
label: Retrieval Practice
category: lesson
applies_when: >
  The learner encountered this concept in a prior lesson (spaced from now).
  The goal is recall and confidence, not new content.

reasoning_principles:
  - Low stakes. This is not assessment.
  - Short and focused — not a full lesson.
  - No new anchor example needed.
  - Confidence building before next new concept.

blueprint_effects:
  resource_length: short
  visual_density: low
  practice_progression: warm_to_medium
  anchor_reuse: none

principles:
  spacing: >
    Best used several lessons after original teaching. The recall effort
    itself is the learning mechanism.
  tone: >
    Low pressure. Frame as practice, not test. Learners should feel
    successful — this builds confidence for the next concept.

avoid:
  - introducing new content
  - cold or transfer questions in a retrieval context
  - heavy explanation blocks — recall should be self-directed

conflicts_with: []
