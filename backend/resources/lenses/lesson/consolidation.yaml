id: consolidation
label: Consolidation
category: lesson
applies_when: >
  The learner has a working model of this concept from prior teaching.
  The goal is fluency, not introduction.

reasoning_principles:
  - Use different examples from the original teaching lesson.
  - Start at medium difficulty, not warm.
  - Reach cold and transfer — that is the consolidation goal.
  - One worked example maximum; learner already saw the method.
  - Full working in the answer key so self-correction is possible.

blueprint_effects:
  practice_progression: medium_to_cold
  worked_examples: minimal
  anchor_reuse: teaching_sequence_only
  answer_key_style: full_working

principles:
  examples: >
    Use different examples from original teaching. Transfer requires
    encountering the concept in an unfamiliar context.
  difficulty: >
    Start at medium. Warm only if signals suggest fragile understanding.
    Cold and transfer are the target — that is what consolidation means.
  scaffolding: >
    Reduce scaffolding compared to first exposure. Learner should be
    attempting independently with minimal worked reference.

avoid:
  - re-teaching the concept from scratch
  - using the same examples as the original teaching lesson
  - starting with warm questions unless learner signals are very weak

conflicts_with:
  - first_exposure
  - repair
