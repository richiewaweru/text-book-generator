id: transfer
label: Transfer
category: lesson
applies_when: >
  The learner is fluent. The goal is applying the concept in novel,
  real-world, or cross-domain contexts.

reasoning_principles:
  - No scaffolding. Learner works independently.
  - Novel contexts — nothing that appeared in teaching or consolidation.
  - Cold and extension questions only.
  - Real-world application is the target.

blueprint_effects:
  practice_progression: cold_to_transfer
  scaffolding: none
  visual_density: low
  anchor_reuse: none

principles:
  novelty: >
    The context must be genuinely unfamiliar. Re-using the teaching
    example at a harder level is not transfer.
  independence: >
    No worked examples. No hints. The challenge is the lesson.

avoid:
  - warm or medium questions
  - scaffolding of any kind
  - familiar examples from earlier in the unit

conflicts_with:
  - first_exposure
  - repair
