id: advanced
label: Advanced Learners
category: support
applies_when: >
  Above-grade, high confidence, analytical learners who disengage with
  excessive scaffolding or slow pace.

reasoning_principles:
  - Compress scaffolding. One worked example maximum.
  - Formal register. Precise terminology.
  - Reach cold and transfer questions.
  - Include at least one open-ended or proof-adjacent question.
  - No hand-holding preamble.

blueprint_effects:
  worked_examples: maximum_one
  practice_progression: medium_to_transfer
  register: formal
  scaffolding: minimal

principles:
  pace: >
    Skip or compress warm questions. Learners who are advanced find
    excessive warm-up patronising and disengage.
  register: >
    Formal, precise language. Use correct mathematical or scientific
    terminology from the first sentence.
  challenge: >
    The cold or transfer question is where advanced learners engage.
    Make it genuinely hard. Open-ended questions or those requiring
    proof are appropriate.

avoid:
  - excessive scaffolding
  - warm questions unless the concept is genuinely new to this group
  - informal or simplified language

conflicts_with: []
