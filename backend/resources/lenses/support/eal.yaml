id: eal
label: EAL Support
category: support
applies_when: >
  English as an additional language learners, or any multilingual classroom
  where English academic vocabulary presents a barrier.

reasoning_principles:
  - High visual density. Images reduce language dependency.
  - DefinitionCard for every key term before first use.
  - No idiom. No cultural references that require local knowledge.
  - Label every diagram element explicitly.
  - Mathematical language over everyday language where both work.

blueprint_effects:
  visual_density: high
  vocabulary_policy: define_first
  labels_required: explicit_on_all_diagrams
  register: plain_and_precise

principles:
  vocabulary: >
    Every technical term gets a DefinitionCard before it appears in
    explanation or questions. Never assume academic vocabulary.
  visual: >
    More diagrams than a standard lesson. Visual support is a language
    scaffold — use it generously.
  language: >
    Avoid idiom. Avoid phrases that require cultural knowledge.
    Prefer precise mathematical language: "the area is 48 cm²"
    rather than "you get 48".

avoid:
  - idiom or culturally-specific examples
  - assuming academic vocabulary
  - dense prose without visual support

conflicts_with: []
