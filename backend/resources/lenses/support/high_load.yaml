id: high_load
label: High Cognitive Load Support
category: support
applies_when: >
  ADHD, dyslexia, below-grade reading, low confidence, or any learner
  for whom the standard pacing or text density would be overwhelming.

reasoning_principles:
  - One idea per component. Never combine explanation and example in one block.
  - Visual before text where possible.
  - More worked examples before independent practice.
  - Short sentences. Active voice. Concrete before abstract.
  - Warm questions heavily scaffolded. Do not reach cold in a first exposure lesson.

blueprint_effects:
  chunking: one_idea_per_component
  visual_density: high
  vocabulary_policy: define_first
  practice_progression: warm_only_or_warm_to_medium
  register: simple

principles:
  chunking: >
    Break content into the smallest possible units. A single idea per
    component. Never ask the learner to hold two things at once.
  visual: >
    Place DiagramBlock before explanation where the concept is spatial.
    Reduce reading load by letting visuals carry meaning.
  register: >
    Short sentences. No passive voice. No assumed vocabulary.
    Define every term before it appears in a question.

avoid:
  - dense prose explanation blocks
  - cold questions for this group in a first exposure lesson
  - idiom or figurative language

conflicts_with: []
